[package]
name = "wk"
version = "0.1.0"
edition = "2021"

[dependencies]
wgpu = "29.0.3"
env_logger = "0.11.11"
imgui = "0.12.0"
pollster = "0.4.0"
raw-window-handle = "0.6.2"
bytemuck = { version = "1.25.0", features = ["derive"] }
smallvec = "1.15.2"
clap = { version = "4.6.1", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
toml = "0.9"
wasmtime = { version = "46", features = ["component-model", "async"] }
wasmtime-wasi = "46"
wasmtime-wasi-io = "46"
wasi-webgpu-wasmtime = { git = "https://github.com/wasi-gfx/wasi-gfx-runtime" }
wasi-graphics-context-wasmtime = { git = "https://github.com/wasi-gfx/wasi-gfx-runtime" }
wgpu-core = "29"
wgpu-types = "29"

[dependencies.sdl3]
version = "0.18"
features = ["raw-window-handle"]
