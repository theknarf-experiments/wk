[env]
LIBRARY_PATH = "{{env.LIBRARY_PATH | default(value='')}}:{{exec(command='brew --prefix')}}/lib"
_.path = ["{{config_root}}"]

[tasks.setup-hooks]
description = "Use .hooks as the git hooks directory"
run = "git config core.hooksPath .hooks"

[tasks.test]
description = "Run the workspace test suite"
run = "cargo nextest run --workspace"
