[settings]
# Install cargo-based tools (cargo-component) from a prebuilt binary when
# cargo-binstall is available, instead of compiling from source.
cargo.binstall = true

[tools]
# Plugin build toolchain, shared by every plugin's `build` task (mise config
# inherits down the tree). Pinned for reproducibility.
"cargo:cargo-component" = "0.21.1"       # Rust plugins → wasm components
"wasm-tools" = "1.252.0"                  # componentization for C plugins
"github:WebAssembly/wasi-sdk" = "wasi-sdk-33"  # clang + wasi-sysroot for C plugins

[env]
LIBRARY_PATH = "{{env.LIBRARY_PATH | default(value='')}}:{{exec(command='brew --prefix')}}/lib"
_.path = ["{{config_root}}"]

[tasks.setup-hooks]
description = "Use .hooks as the git hooks directory"
run = "git config core.hooksPath .hooks"

[tasks.test]
description = "Run the workspace test suite"
run = "cargo nextest run --workspace"
